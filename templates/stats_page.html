{% extends "base.html" %}

{% block title %}Tus Estadísticas - Simulador Carrera IT{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h2 class="mb-4 text-center"><i class="ph-duotone ph-chart-bar me-2 text-primary"></i> Tus Estadísticas</h2>
            
            {% include "partials/stats_panel.html" %}
            
            <div class="mt-4 text-center">
                {% if current_decision_id %}
                    <a href="{{ url_for('main.decision_view', decision_id=current_decision_id) }}" class="btn btn-primary btn-lg w-100 mb-2">Volver a la Partida</a>
                {% else %}
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg w-100 mb-2">Ir al Inicio</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
